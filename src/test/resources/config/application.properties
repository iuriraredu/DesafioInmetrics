# ==============================================
# CONFIGURAÇÕES GERAIS DE EXECUÇÃO DE TESTES
# ==============================================
# Navegador padrão para execução dos testes web
# Valores aceitos: "Edge", "Chrome", "Firefox"
# Obs.: O navegador deve estar instalado no ambiente de execução
BROWSER=Edge

# Define se o navegador será executado em modo headless (sem interface gráfica)
# Valores aceitos: true (sem interface) ou false (com interface)
# Recomendado para CI/CD: true
HEADLESS_MODE=false

# ==============================================
# CONFIGURAÇÕES DE ESPERA (WAITS)
# ==============================================
# Tempo máximo (em segundos) para aguardar o carregamento de elementos/páginas
# Usado em esperas explícitas (WebDriverWait)
# Valor típico para CI/CD: 60 (ambientes mais lentos)
GLOBAL_TIMEOUT=1

# Intervalo (em milissegundos) entre verificações durante esperas explícitas
# Valor muito baixo pode sobrecarregar o sistema
# Valor muito alto pode aumentar tempo de execução
POLLING_INTERVAL=5

# ==============================================
# CONFIGURAÇÕES DE AMBIENTE (URLs)
# ==============================================
# URL base da aplicação (usada tanto para testes web quanto API)
# Deve incluir protocolo (http/https) sem barra no final
BASEURL=https://advantageonlineshopping.com

# ==============================================
# ENDPOINTS DA API
# ==============================================
# Endpoint para busca de produtos (relativo à BASEURL)
SEARCH_PRODUCTS_ENDPOINT=/catalog/api/v1/products/search

# Endpoint para criação de usuários (relativo à BASEURL)
CREATE_USER_ACCOUNT_ENDPOINT=/accountservice/accountrest/api/v1/register

# Endpoint para autenticação (relativo à BASEURL)
LOGIN_ENDPOINT=/accountservice/accountrest/api/v1/login

# Endpoint para upload de imagens (relativo à BASEURL)
UPLOAD_IMAGE_ENDPOINT=/catalog/api/v1/product/image

# ==============================================
# CONFIGURAÇÕES DE RELATÓRIOS
# ==============================================
# Caminho relativo (a partir da raiz do projeto) onde serão gerados:
# - Relatórios HTML do Cucumber
# - JSON com dados detalhados
# - Relatórios JUnit
# Obs.: Não incluir barra no final
reportPath=target/cucumber-reports/web