  name: DesafioInmetrics

  on:
    push:
      branches:
        - main
    pull_request:
      branches:
        - main

  jobs:
    build:
      runs-on: ubuntu-latest

      steps:
        - name: Checkout code
          uses: actions/checkout@v3

        - name: Set up JDK 21
          uses: actions/setup-java@v2
          with:
            java-version: '21'

        - name: Build with Maven
          run: mvn clean install

        - name: Run tests
          run: mvn test

        - name: Publish test results
          uses: actions/upload-artifact@v2
          with:
            name: test-results