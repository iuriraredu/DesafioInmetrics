name: Testes - DesafioInmetrics

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build e Testes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Cache do Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build e Testes
        run: mvn clean install test
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAVEN_OPTS: -Xmx1024m -XX:+TieredCompilation -XX:TieredStopAtLevel=1

      - name: Ensure Reports Directory Exists
        run: mkdir -p target/cucumber-reports/  # Cria se não existir
        if: always()

      - name: Upload Relatórios de Teste
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: relatorios-teste
          path: |
            target/cucumber-reports/cucumber-reports.html
            target/cucumber-reports/junit-report.xml
            target/cucumber-reports/cucumber.json
            target/surefire-reports/*.xml
            target/failsafe-reports/*.xml
        continue-on-error: true